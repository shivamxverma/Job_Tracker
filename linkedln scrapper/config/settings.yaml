app:
  name: linkedln-scrapper
  environment: local

storage:
  backend: csv
  csv_dir: data/csv

scraping:
  max_detail_concurrency: 3
  max_jobs_per_search: 30
  max_scroll_attempts: 8
  page_timeout_ms: 120000
  min_delay_seconds: 2.0
  max_delay_seconds: 7.0
  snapshot_on_error: true
  snapshot_sample_rate: 0.05
  selectors_path: config/selectors/linkedin_jobs.yaml

ranking:
  send_threshold: 75
  hold_threshold: 60
  max_notifications_per_run: 5
  weights:
    title: 25
    skills: 25
    interests: 20
    seniority: 10
    workplace: 5
    recency: 5
    description_quality: 5
    preferred_stack: 5
    hard_negative_penalty: -60
    soft_negative_penalty: -20
    missing_skill_penalty: -4

scheduler:
  enabled: false
  interval_minutes: 180

notifications:
  telegram_enabled: true
  dry_run: false
